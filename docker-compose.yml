services:
  mongo:
    image: mongo:7
    container_name: logistics-mongo
    ports:
      - "27017:27017"
    # Run as a single-node replica set so multi-document transactions work
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try {
            rs.status().ok === 1 ? quit(0) : quit(1)
          } catch(e) {
            try { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }); quit(0) } catch(e2) { quit(1) }
          }
        "
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logistics-backend
    ports:
      - "4000:4000"
    environment:
      MONGO_URI: mongodb://mongo:27017/logistics?replicaSet=rs0
      PORT: "4000"
      CORS_ORIGIN: "*"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
